<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Our Date ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>


<body>


<!-- PAGE 1 -->
<div id="page1">

    <h1>
        Will you be my date? ❤️
    </h1>


    <div class="buttons">

        <button id="yesBtn">
            YES ❤️
        </button>


        <button id="noBtn">
            NO 😭
        </button>

    </div>

</div>




<!-- PAGE 2 -->
<div id="page2" class="hidden">


    <h1>
        Yayyyy! 🥰
    </h1>


    <p>
        Before we continue...
    </p>


    <label>
        Your Name ❤️
    </label>

    <br>


    <input 
        type="text"
        id="partnerName"
        placeholder="Enter your name">


    <br><br>



    <h2>
        Choose our date 💕
    </h2>



    <input 
        type="date"
        id="date">



    <br><br>



    <input 
        type="time"
        id="time">



    <br><br>



    <button id="confirmBtn">
        Confirm ❤️
    </button>


</div>





<!-- PAGE 3 -->
<div id="page3" class="hidden">


    <h1>
        It's a date! 💖
    </h1>



    <p>
        Your chosen schedule:
    </p>



    <h2 id="chosenDate"></h2>



    <p>
        Can't wait to see you ❤️
    </p>


</div>





<!-- MUSIC -->
<audio id="bgMusic" loop>

    <source src="music.mp3" type="audio/mpeg">

</audio>





<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<!-- YOUR SCRIPT -->
<script src="script.js"></script>



</body>

</html>
